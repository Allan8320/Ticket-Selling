apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-ticket-deployment
  labels:
    app: smart-ticket-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smart-ticket-app
  template:
    metadata:
      labels:
        app: smart-ticket-app
    spec:
      containers:
      - name: smart-ticket-container
        image: allanpaul/smart-ticket-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
