apiVersion: v1
kind: Service
metadata:
  name: smart-ticket-service
spec:
  type: NodePort
  selector:
    app: smart-ticket-app
  ports:
    - protocol: TCP
      port: 3000          # The port the service exposes
      targetPort: 3000    # The port the container listens on
      nodePort: 30000     # The static port to access from outside (range 30000-32767)
