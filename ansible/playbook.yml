---
- name: Deploy Smart Ticket Booking System Locally
  hosts: local
  become: false  # Depending on your local OS setup, you might need become: true (sudo)

  tasks:
    - name: Ensure Node.js and npm are present (Simulated)
      debug:
        msg: "Checking if Node.js and npm are installed. (Please ensure they are installed in Windows/WSL)"

    - name: Ensure Docker is present (Simulated)
      debug:
        msg: "Checking if Docker is installed. (Please ensure Docker Desktop is running)"

    - name: Start the Docker container
      shell: "docker-compose up -d"
      args:
        chdir: "../"  # Runs this from the main smart-ticket-system directory
      ignore_errors: yes  # Ignored if you don't have python-docker package locally
      register: docker_output

    - name: Display Container Startup Status
      debug:
        msg: "Docker container started: {{ docker_output.stdout }}"
